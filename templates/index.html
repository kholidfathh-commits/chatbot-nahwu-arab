<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abu Nahwiy — Tutor Tata Bahasa Arab</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>

<style>
  :root{
    --green-dark:#0d4f3c;
    --green:#15795b;
    --green-light:#1f9d75;
    --gold:#cda434;
    --cream:#f7f3e8;
    --bg:#e9f1ec;
    --ink:#1d2a25;
    --muted:#7a8a83;
    --bot-bubble:#ffffff;
    --user-bubble:#15795b;
    --line:#e4e9e6;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Poppins',system-ui,sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, #d8e8df 0%, transparent 60%),
      radial-gradient(900px 500px at -10% 110%, #dfeee6 0%, transparent 55%),
      var(--bg);
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    padding:18px;
  }

  .app{
    width:100%;max-width:880px;height:92vh;max-height:880px;
    background:var(--cream);
    border-radius:24px;
    box-shadow:0 24px 60px rgba(13,79,60,.18), 0 2px 6px rgba(0,0,0,.05);
    display:flex;flex-direction:column;overflow:hidden;
    border:1px solid rgba(255,255,255,.6);
  }

  /* ---------- Header ---------- */
  .header{
    position:relative;
    background:linear-gradient(135deg, var(--green-dark) 0%, var(--green) 55%, var(--green-light) 100%);
    color:#fff;padding:20px 24px;
    display:flex;align-items:center;gap:16px;
  }
  .header::after{
    content:"";position:absolute;inset:0;
    background-image:radial-gradient(rgba(255,255,255,.09) 1.2px, transparent 1.2px);
    background-size:18px 18px;opacity:.6;pointer-events:none;
  }
  .logo{
    width:54px;height:54px;flex:0 0 54px;border-radius:16px;
    background:rgba(255,255,255,.14);
    display:flex;align-items:center;justify-content:center;
    border:1px solid rgba(255,255,255,.25);position:relative;z-index:1;
  }
  .logo svg{width:30px;height:30px;}
  .head-text{position:relative;z-index:1;flex:1;min-width:0;}
  .head-text h1{font-size:1.28rem;font-weight:600;letter-spacing:.2px;}
  .head-text .ar{font-family:'Amiri',serif;font-weight:700;color:var(--gold);}
  .head-text p{font-size:.82rem;opacity:.9;font-weight:300;margin-top:2px;}
  .status{display:inline-flex;align-items:center;gap:6px;font-size:.72rem;
    margin-top:6px;background:rgba(255,255,255,.13);padding:3px 10px;border-radius:20px;}
  .dot{width:8px;height:8px;border-radius:50%;background:#7CFFB2;box-shadow:0 0 0 0 rgba(124,255,178,.7);
    animation:pulse 2s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(124,255,178,.6);}70%{box-shadow:0 0 0 7px rgba(124,255,178,0);}100%{box-shadow:0 0 0 0 rgba(124,255,178,0);}}

  /* ---------- Tabs ---------- */
  .tabs{
    display:flex;gap:8px;padding:14px 16px;background:var(--cream);
    border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex:0 0 auto;display:flex;align-items:center;gap:7px;
    padding:9px 15px;border-radius:30px;cursor:pointer;
    background:#fff;border:1.5px solid var(--line);
    font-size:.84rem;font-weight:500;color:var(--ink);white-space:nowrap;
    transition:all .18s ease;user-select:none;
  }
  .tab:hover{border-color:var(--green-light);transform:translateY(-1px);}
  .tab.active{
    background:linear-gradient(135deg,var(--green),var(--green-light));
    color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(21,121,91,.28);
  }
  .tab .ic{font-size:1rem;}

  /* ---------- Messages ---------- */
  .messages{
    flex:1;overflow-y:auto;padding:22px 20px;display:flex;flex-direction:column;gap:16px;
    background:linear-gradient(180deg,#fbf9f2 0%,var(--cream) 100%);
  }
  .messages::-webkit-scrollbar{width:8px;}
  .messages::-webkit-scrollbar-thumb{background:#d8ddd9;border-radius:10px;}

  .chip{align-self:center;background:#e7efe9;color:var(--green);
    font-size:.74rem;font-weight:600;padding:5px 14px;border-radius:20px;
    border:1px solid #d4e2da;}

  .msg{display:flex;gap:10px;max-width:86%;animation:fade .28s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .msg-bot{align-self:flex-start;}
  .msg-user{align-self:flex-end;flex-direction:row-reverse;}
  .avatar{
    width:36px;height:36px;flex:0 0 36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:1.05rem;
    background:#fff;border:1px solid var(--line);box-shadow:0 2px 5px rgba(0,0,0,.05);
  }
  .msg-user .avatar{background:var(--green-dark);}
  .bubble{
    padding:12px 16px;border-radius:16px;font-size:.93rem;line-height:1.75;
    unicode-bidi:plaintext;word-wrap:break-word;overflow-wrap:anywhere;
  }
  .msg-bot .bubble{
    background:var(--bot-bubble);border:1px solid var(--line);
    border-top-left-radius:4px;box-shadow:0 3px 10px rgba(13,79,60,.06);
  }
  .msg-user .bubble{
    background:var(--user-bubble);color:#fff;border-top-right-radius:4px;
    box-shadow:0 3px 10px rgba(21,121,91,.22);
  }
  /* markdown di dalam bubble bot */
  .bubble p{margin:0 0 8px;}
  .bubble p:last-child{margin-bottom:0;}
  .bubble strong{color:var(--green-dark);}
  .bubble ul,.bubble ol{margin:6px 0 8px;padding-inline-start:22px;}
  .bubble li{margin:3px 0;}
  .bubble code{background:#eef3f0;padding:1px 6px;border-radius:6px;font-size:.85em;}
  .bubble pre{background:#0f2e25;color:#d8f3e6;padding:12px;border-radius:10px;overflow-x:auto;margin:8px 0;}
  .bubble pre code{background:none;color:inherit;padding:0;}
  .bubble table{border-collapse:collapse;width:100%;margin:8px 0;font-size:.88rem;}
  .bubble th,.bubble td{border:1px solid var(--line);padding:6px 10px;text-align:start;}
  .bubble th{background:#eef3f0;color:var(--green-dark);}
  .bubble h1,.bubble h2,.bubble h3{font-size:1rem;margin:8px 0 4px;color:var(--green-dark);}

  /* typing indicator */
  .typing{display:flex;gap:5px;align-items:center;padding:15px 16px;}
  .typing span{width:8px;height:8px;border-radius:50%;background:var(--green-light);
    animation:bounce 1.3s infinite ease-in-out;}
  .typing span:nth-child(2){animation-delay:.18s;}
  .typing span:nth-child(3){animation-delay:.36s;}
  @keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.5;}40%{transform:scale(1);opacity:1;}}

  /* ---------- Input ---------- */
  .composer{
    padding:14px 16px;background:var(--cream);border-top:1px solid var(--line);
  }
  .composer-inner{
    display:flex;align-items:flex-end;gap:10px;
    background:#fff;border:1.5px solid var(--line);border-radius:20px;
    padding:6px 6px 6px 16px;transition:border-color .18s;
  }
  .composer-inner:focus-within{border-color:var(--green-light);box-shadow:0 0 0 3px rgba(31,157,117,.12);}
  textarea{
    flex:1;border:none;outline:none;resize:none;font-family:inherit;
    font-size:.93rem;line-height:1.5;max-height:130px;background:transparent;
    color:var(--ink);padding:8px 0;
  }
  .send{
    width:42px;height:42px;flex:0 0 42px;border-radius:50%;border:none;cursor:pointer;
    background:linear-gradient(135deg,var(--green),var(--green-light));color:#fff;
    display:flex;align-items:center;justify-content:center;transition:transform .15s,opacity .15s;
  }
  .send:hover{transform:scale(1.07);}
  .send:disabled{opacity:.45;cursor:not-allowed;transform:none;}
  .send svg{width:19px;height:19px;}
  .hint{text-align:center;font-size:.71rem;color:var(--muted);margin-top:9px;}

  @media (max-width:600px){
    body{padding:0;}
    .app{height:100vh;max-height:none;border-radius:0;}
    .msg{max-width:92%;}
    .head-text h1{font-size:1.1rem;}
  }
</style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#cda434" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2c1.2 1.6 1.2 3.4 0 5"/>
          <path d="M3 21v-7a9 9 0 0 1 18 0v7"/>
          <path d="M3 21h18"/>
          <path d="M9 21v-4a3 3 0 0 1 6 0v4"/>
          <path d="M12 7v2"/>
        </svg>
      </div>
      <div class="head-text">
        <h1><span class="ar">Abu Nahwiy</span> — Tutor Tata Bahasa Arab</h1>
        <p>Belajar Nahwu &amp; Sharaf untuk pemula, ditemani guru AI yang sabar</p>
        <span class="status"><span class="dot"></span> Siap membantu</span>
      </div>
    </div>

    <!-- Tabs mode -->
    <div class="tabs" id="tabs">
      {% for key, m in modes.items() %}
      <div class="tab{% if key == '1' %} active{% endif %}" data-mode="{{ key }}">
        <span class="ic">{{ m.ikon }}</span>{{ m.nama }}
      </div>
      {% endfor %}
    </div>

    <!-- Area pesan -->
    <div class="messages" id="messages"></div>

    <!-- Input -->
    <div class="composer">
      <div class="composer-inner">
        <textarea id="input" rows="1" placeholder="Tulis pertanyaanmu di sini..."></textarea>
        <button class="send" id="send" title="Kirim">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.4 20.4l17.45-7.48a1 1 0 0 0 0-1.84L3.4 3.6a1 1 0 0 0-1.39 1.18L4.6 11.5 12 12l-7.4.5-2.59 6.72a1 1 0 0 0 1.39 1.18z"/></svg>
        </button>
      </div>
      <div class="hint">Tekan <b>Enter</b> untuk kirim • Shift+Enter untuk baris baru • Jawaban AI bisa keliru, tetap cek ke guru/kitab.</div>
    </div>
  </div>

<script>
  const MODES = {{ modes|tojson }};
  let currentMode = "1";
  let history = [];     // {role, content}
  let sending = false;

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  function scrollBottom(){ messagesEl.scrollTop = messagesEl.scrollHeight; }

  function addMessage(role, text, useMarkdown){
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + (role === 'user' ? 'msg-user' : 'msg-bot');

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '🧑' : '🧑‍🏫';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (useMarkdown && window.marked){
      bubble.innerHTML = marked.parse(text);
    } else {
      bubble.textContent = text;
    }

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollBottom();
  }

  function addChip(text){
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = text;
    messagesEl.appendChild(chip);
    scrollBottom();
  }

  function showTyping(){
    const wrap = document.createElement('div');
    wrap.className = 'msg msg-bot';
    wrap.id = 'typing';
    wrap.innerHTML = '<div class="avatar">🧑‍🏫</div><div class="bubble typing"><span></span><span></span><span></span></div>';
    messagesEl.appendChild(wrap);
    scrollBottom();
  }
  function hideTyping(){ const t = document.getElementById('typing'); if (t) t.remove(); }

  function setSending(v){
    sending = v;
    sendBtn.disabled = v;
  }

  function autoresize(){
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 130) + 'px';
  }

  async function send(){
    const text = inputEl.value.trim();
    if (!text || sending) return;

    addMessage('user', text, false);
    history.push({role:'user', content:text});
    inputEl.value=''; autoresize();
    setSending(true);
    showTyping();

    try{
      const res = await fetch('/chat', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({mode: currentMode, history})
      });
      const data = await res.json();
      hideTyping();
      addMessage('bot', data.reply, true);
      history.push({role:'assistant', content:data.reply});
    }catch(e){
      hideTyping();
      addMessage('bot', '⚠️ Gagal terhubung ke server. Pastikan aplikasi masih berjalan (python app.py).', false);
    }finally{
      setSending(false);
      inputEl.focus();
    }
  }

  function switchMode(key, greet){
    currentMode = key;
    history = [];
    messagesEl.innerHTML = '';
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode === key));
    if (greet){
      addMessage('bot', 'السلام عليكم ورحمة الله! Saya **Abu Nahwiy**, teman belajarmu. Yuk pelan-pelan, insya Allah bisa! 😊', true);
    }
    addChip('Mode: ' + MODES[key].nama);
    addMessage('bot', MODES[key].pembuka, false);
    inputEl.focus();
  }

  // Event listeners
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => switchMode(tab.dataset.mode, false));
  });
  sendBtn.addEventListener('click', send);
  inputEl.addEventListener('input', autoresize);
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      send();
    }
  });

  // Inisialisasi
  switchMode('1', true);
</script>
</body>
</html>
